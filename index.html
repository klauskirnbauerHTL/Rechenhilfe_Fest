<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Handy Rechenhilfe</title><script src="config.js"></script><style>
:root{--bg:#f7f4ed;--card:#fffdf8;--line:#ddd5c6;--text:#1f1f1f;--muted:#69645b;--accent:#0d6a6f;--green:#1a7a3c;}
*{-webkit-box-sizing:border-box;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;}
.wrap{max-width:100vw;padding:8px;} h1{margin:0 0 4px;font-size:clamp(1.25rem,5vw,1.9rem);line-height:1.1;}
.sub{margin:0 0 8px;color:var(--muted);font-size:.9rem;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;-webkit-box-shadow:0 6px 18px rgba(0,0,0,.05);box-shadow:0 6px 18px rgba(0,0,0,.05);}
.sumcard,.tablecard,.histcard{padding:8px;} .grid{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:8px;}
button{border:0;border-radius:14px;min-height:52px;font-weight:900;font:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;}
.secondary{background:#ece5d6;} .danger{background:#7f1d1d;color:#fff;} .green{background:var(--green);color:#fff;}
.toprow{display:-webkit-flex;display:flex;-webkit-align-items:stretch;align-items:stretch;gap:8px;margin-bottom:8px;}
.tischbox{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-flex:0.75;flex:0.75;max-width:220px;}
.tischbox label{font-size:.78rem;color:var(--muted);margin-bottom:3px;}
.tischbox input{width:100%;padding:12px 10px;border:1px solid var(--line);border-radius:12px;background:#fff;font:inherit;font-size:1rem;font-weight:900;-webkit-appearance:none;appearance:none;}
.btnrow{display:-webkit-flex;display:flex;gap:8px;-webkit-align-self:flex-end;align-self:flex-end;}
.editbadge{display:inline-block;background:#a96b17;color:#fff;border-radius:8px;font-size:.78rem;padding:2px 8px;margin-left:8px;font-weight:700;vertical-align:middle;}
.big{font-size:clamp(2rem,8vw,3rem);font-weight:900;color:var(--accent);line-height:1;margin:4px 0 8px;}
.stats{display:-webkit-flex;display:flex;gap:6px;}
.stat{background:#f4efe4;border-radius:12px;padding:8px 9px;-webkit-flex:1;flex:1;}
.k{font-size:.74rem;color:var(--muted);} .v{font-size:.98rem;font-weight:900;}
.tablecards-container{display:flex;flex-direction:column;gap:8px;}
.tablecard{overflow:auto;-webkit-overflow-scrolling:touch;max-height:55vh;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th,td{padding:8px 4px;border-bottom:1px solid var(--line);vertical-align:middle;}
th{position:-webkit-sticky;position:sticky;top:0;background:#f0eadf;text-align:left;z-index:1;font-size:.88rem;}
.item{width:64%;} .qtycell{width:36%;}
.n{font-weight:800;font-size:.92rem;line-height:1.05;} .c{font-size:.76rem;color:var(--muted);}
.p,.s{width:12%;white-space:nowrap;font-weight:900;text-align:right;font-variant-numeric:tabular-nums;font-size:.92rem;}
.step{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;justify-content:space-between;gap:4px;}
.q{text-align:center;font-weight:900;font-size:1.05rem;min-width:24px;-webkit-flex:1;flex:1;}
.m,.pbtn{-webkit-flex-shrink:0;flex-shrink:0;width:44px;height:44px;border-radius:14px;background:#ece5d6;font-size:1.45rem;line-height:1;padding:0;}
.histcard h2{font-size:1.1rem;margin:0 0 4px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.hist-totalbox{background:#f4efe4;border:1px solid var(--line);border-radius:12px;padding:8px 10px;min-width:150px;text-align:right;}
.hist-totalbox .label{font-size:.72rem;color:var(--muted);line-height:1;}
.hist-totalbox .value{font-size:1.15rem;color:var(--accent);font-weight:900;line-height:1.1;}
.hist-entry{border:1px solid var(--line);border-radius:12px;margin-bottom:8px;padding:8px 10px;background:#f9f7f2;cursor:pointer;}
.hist-entry.editing{border:2px solid #a96b17;background:#fff8f0;}
.hist-head{display:grid;grid-template-columns:1fr 110px 32px;gap:8px;align-items:center;font-weight:900;}
.hist-tisch{font-size:1.05rem;color:var(--accent);min-width:0;}
.hist-total{font-size:1.2rem;color:var(--accent);text-align:center;width:110px;justify-self:center;}
.hist-time{font-size:.78rem;color:var(--muted);margin-top:2px;}
.hist-items{margin-top:6px;font-size:.88rem;color:var(--muted);}
.hist-item{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;padding:2px 0;border-bottom:1px solid #ede8df;}
.hist-item:last-child{border:0;}
.del-btn{background:none;border:0;color:#9b2020;font-size:1rem;min-height:auto;padding:4px 8px;border-radius:8px;font-weight:900;}
.empty{color:var(--muted);font-size:.9rem;padding:8px 0;}
.hint{font-size:.8rem;color:var(--muted);margin-bottom:6px;}
#printBtn{background:#666;color:#fff;border:0;border-radius:8px;min-height:auto;padding:6px 12px;font-size:.85rem;font-weight:700;cursor:pointer;}
#printBtn:hover{background:#444;}
@media print{body{background:#fff;color:#000;} .wrap,.wrap *{background:#fff !important;color:#000!important;box-shadow:none !important;border-color:#000 !important;} #printBtn,.del-btn,.green,.danger,.secondary,.m,.pbtn,.btnrow,#editBadge,.stats,.tablecard-label{display:none !important;} .print-table{width:100%;border-collapse:collapse;margin:20px 0;} .print-table th{background:#f0f0f0;color:#000;padding:10px;text-align:left;border:1px solid #000;font-weight:700;} .print-table td{padding:10px;border:1px solid #000;} .print-table tr:nth-child(even){background:#f9f9f9;} .print-section-title{font-size:1.2rem;font-weight:700;margin-top:20px;margin-bottom:10px;} .print-date{font-size:.9rem;color:#666;margin-top:10px;}}
@media (min-width:768px){.wrap{max-width:100%;} .tablecard{max-height:60vh;} .tablecards-container{flex-direction:row;flex-wrap:nowrap;} .tablecard{flex:1;min-width:0;} .tablecard-label{font-weight:900;font-size:.95rem;color:var(--accent);margin-bottom:4px;text-align:center;} .n{font-size:.8rem;} .c{font-size:.7rem;} .p,.s{font-size:.8rem;} th{font-size:.78rem;} td{padding:6px 3px;}}
@media (min-width:1024px){.wrap{max-width:100%;} .n{font-size:.88rem;} .c{font-size:.76rem;} .p,.s{font-size:.88rem;} th{font-size:.85rem;} td{padding:8px 4px;}}
@media (min-width:1280px){.wrap{max-width:100%;} .n{font-size:.92rem;} .c{font-size:.78rem;} .p,.s{font-size:.92rem;} th{font-size:.88rem;}}
@media (min-width:900px){.wrap{max-width:1200px;padding:16px;} .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));align-items:start;} .sumcard{grid-column:1/3;} .histcard{grid-column:1/3;} .tablecards-container{grid-column:1/3;display:flex;} .tablecard{max-height:70vh;} .item{width:58%;} .qtycell{width:28%;} .p,.s{width:7%;}}
@media (min-width:1200px) and (orientation:landscape){.wrap{max-width:1400px;} .grid{grid-template-columns:1.1fr .9fr;} .sumcard{grid-column:1/3;} .tablecard{grid-column:1/3;max-height:72vh;} .histcard{grid-column:1/3;}} 
@media (max-width:420px){.item{width:50%;} .qtycell{width:34%;} th:nth-child(4),td:nth-child(4){display:none;}}
@media (max-width:360px){.m,.pbtn{width:40px;height:40px;font-size:1.3rem;} td,th{padding:7px 3px;} .p,.s{font-size:.88rem;}}
</style></head><body><div class="wrap"><h1>Rechenhilfe</h1><div class="sub">Für Kellner und Schankpersonal.</div><div class="grid"><div class="card sumcard"><div class="toprow"><div class="tischbox"><label for="tischnr">Tischnummer <span id="editBadge" class="editbadge" style="display:none">&#9999;&#65039; Bearbeitung</span></label><input id="tischnr" type="text" placeholder="z. B. 3 oder A2" inputmode="numeric"></div><div class="btnrow"><button class="green" id="okBtn" style="min-width:96px;min-height:60px;padding:0 18px;font-size:1.05rem">OK &#10003;</button><button class="danger" id="resetBtn" style="min-width:96px;min-height:60px;padding:0 18px;font-size:1.05rem">L&ouml;schen</button></div></div><div class="k">Gesamtbetrag</div><div class="big" id="grand">0,00 &#8364;</div><div class="stats"><div class="stat"><div class="k">Positionen</div><div class="v" id="active">0</div></div><div class="stat"><div class="k">St&uuml;ck</div><div class="v" id="qtysum">0</div></div><div class="stat"><div class="k">Getr&auml;nke</div><div class="v" id="drinks">0,00 &#8364;</div></div></div></div><div class="tablecards-container" id="tablecards-container"></div><div class="card histcard"><h2>Verlauf <span class="hist-totalbox"><span class="label">Gesamtsumme Verlauf</span><span class="value" id="histTotalValue">0,00 &#8364;</span></span><button id="printBtn">🖨️ Drucken</button></h2><div class="hint">Auf einen Eintrag tippen zum Bearbeiten.</div><div id="histList"></div></div></div></div><script>
const euro = n => new Intl.NumberFormat('de-AT', {style:'currency', currency:'EUR'}).format(n);
let trs = [];
const grand = document.getElementById('grand');
const activeStat = document.getElementById('active');
const qtysum = document.getElementById('qtysum');
const drinks = document.getElementById('drinks');
const histTotalValue = document.getElementById('histTotalValue');
const tischInput = document.getElementById('tischnr');
const editBadge = document.getElementById('editBadge');
const STORAGE_KEY = 'schank_history';
let editId = null;
let config = null;

function initTables(){ if(!config) return; var container=document.getElementById('tablecards-container'); container.innerHTML=''; config.kategorien.forEach(function(kat){ var html='<div class="card tablecard"><div class="tablecard-label">'+kat.label+'</div><table><thead><tr><th>Artikel</th><th>Preis</th><th>Menge</th><th>Summe</th></tr></thead><tbody>'; kat.artikel.forEach(function(art){ html+='<tr data-cat="'+kat.id+'" data-name="'+art.name.toLowerCase()+'" data-itemname="'+art.name+'" data-preis="'+art.preis+'"><td class="item"><div class="n">'+art.name+'</div><div class="c">'+kat.name+'</div></td><td class="p">'+euro(art.preis)+'</td><td class="qtycell"><div class="step"><button class="m">&#8722;</button><span class="q">0</span><button class="pbtn">+</button></div></td><td class="s">0,00 €</td></tr>'; }); html+='</tbody></table></div>'; container.innerHTML+=html; }); trs=Array.prototype.slice.call(document.querySelectorAll('tbody tr')); trs.forEach(function(r){ var qspan=r.querySelector('.q'); r.querySelector('.pbtn').addEventListener('click',function(){ qspan.textContent=(parseInt(qspan.textContent||'0',10)||0)+1; recalc(); }); r.querySelector('.m').addEventListener('click',function(){ qspan.textContent=Math.max(0,(parseInt(qspan.textContent||'0',10)||0)-1); recalc(); }); }); recalc(); }
function parsePrice(t){ return parseFloat(t.replace(' \u20ac','').replace(/\./g,'').replace(',','.'))||0; }
function recalc(){ var g=0,a=0,q=0,d=0; trs.forEach(function(r){ var p=parseFloat(r.dataset.preis)||0; var c=parseInt(r.querySelector('.q').textContent||'0',10)||0; var s=p*c; r.querySelector('.s').textContent=euro(s); g+=s; q+=c; if(c>0)a++; if(r.dataset.cat==='getränke')d+=s; }); grand.textContent=euro(g); activeStat.textContent=a; qtysum.textContent=q; drinks.textContent=euro(d); }
function clearForm(){ trs.forEach(function(r){ r.querySelector('.q').textContent='0'; }); tischInput.value=''; editId=null; editBadge.style.display='none'; recalc(); renderHistory(); }
document.getElementById('resetBtn').addEventListener('click', clearForm);
document.getElementById('okBtn').addEventListener('click', function(){ var tisch=tischInput.value.trim()||'Schank'; var artikel=[]; var total=0; trs.forEach(function(r){ var n=r.querySelector('.n').textContent; var c=parseInt(r.querySelector('.q').textContent||'0',10)||0; var p=parseFloat(r.dataset.preis)||0; if(c>0){ artikel.push({name:n,menge:c,einzelpreis:p,summe:p*c}); total+=p*c; } }); if(artikel.length===0){ alert('Keine Artikel ausgewählt!'); return; } var hist=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); hist = hist.filter(function(e){ return e.id!==editId; }); var now=Date.now(); var eintrag={id:now,tisch:tisch,zeit:new Date().toISOString(),gesamt:total,artikel:artikel}; hist.unshift(eintrag); hist.sort(function(a,b){ return b.id-a.id; }); localStorage.setItem(STORAGE_KEY, JSON.stringify(hist)); clearForm(); });
function loadForEdit(id){ var hist=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); var e=null; for(var i=0;i<hist.length;i++){ if(hist[i].id===id){e=hist[i];break;} } if(!e) return; trs.forEach(function(r){ r.querySelector('.q').textContent='0'; }); e.artikel.forEach(function(a){ for(var i=0;i<trs.length;i++){ if(trs[i].dataset.itemname===a.name){ trs[i].querySelector('.q').textContent=String(a.menge); break; } } }); tischInput.value=e.tisch; editId=id; editBadge.style.display='inline-block'; recalc(); window.scrollTo(0,0); renderHistory(); }
function delEntry(id){ var hist=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); hist=hist.filter(function(e){ return e.id!==id; }); localStorage.setItem(STORAGE_KEY, JSON.stringify(hist)); if(editId===id) clearForm(); else renderHistory(); }
function renderHistory(){ var hist=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); var el=document.getElementById('histList'); var total=0; hist.forEach(function(e){ total += e.gesamt || 0; }); histTotalValue.textContent = euro(total); if(hist.length===0){ el.innerHTML='<div class="empty">Noch keine Einträge gespeichert.</div>'; return; } el.innerHTML=hist.map(function(e){ var d=new Date(e.zeit); var ts=d.toLocaleDateString('de-AT')+' '+d.toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'}); var items=e.artikel.map(function(a){ return '<div class="hist-item"><span>'+a.menge+'\u00d7 '+a.name+'</span><span>'+euro(a.summe)+'</span></div>'; }).join(''); var editing=editId===e.id ? ' editing' : ''; return '<div class="hist-entry'+editing+'" onclick="loadForEdit('+e.id+')"><div class="hist-head"><span class="hist-tisch">Tisch '+e.tisch+'</span><span class="hist-total">'+euro(e.gesamt)+'</span><button class="del-btn" onclick="event.stopPropagation();delEntry('+e.id+')">\u2715</button></div><div class="hist-time">'+ts+'</div><div class="hist-items">'+items+'</div></div>'; }).join(''); }
function printHistory(){ var hist=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); if(hist.length===0){ alert('Keine Einträge zum Drucken!'); return; } var html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>Verlauf</title><style>body{font-family:Arial,sans-serif;margin:20px;background:#fff;color:#000;} table{width:100%;border-collapse:collapse;margin:20px 0;} th{background:#f0f0f0;padding:10px;text-align:left;border:1px solid #000;font-weight:700;} td{padding:10px;border:1px solid #000;} tr:nth-child(even){background:#f9f9f9;} .total{font-weight:700;} .date{font-size:.9rem;color:#666;margin-top:20px;} .order-header td{background:#efefef;font-weight:800;padding:12px;border:1px solid #000;}</style></head><body><h1>Verlauf Schankstelle</h1><table><thead><tr><th>Tisch</th><th>Zeit</th><th>Artikel</th><th>Menge</th><th>Preis</th><th>Summe</th></tr></thead><tbody>'; var grandTotal=0; hist.forEach(function(e){ var d=new Date(e.zeit); var ts=d.toLocaleDateString('de-AT')+' '+d.toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'}); // Header row per order to visually group positions
 html += '<tr class="order-header"><td colspan="6">Tisch '+e.tisch+' — '+ts+' — Gesamt: '+euro(e.gesamt)+'</td></tr>'; e.artikel.forEach(function(a){ html+='<tr><td></td><td></td><td>'+a.name+'</td><td>'+a.menge+'</td><td>'+euro(a.einzelpreis)+'</td><td class="total">'+euro(a.summe)+'</td></tr>'; }); grandTotal+=e.gesamt; }); html+='</tbody></table><p class="total" style="text-align:right;font-size:1.2rem;">Gesamtsumme: '+euro(grandTotal)+'</p><p class="date">Gedruckt: '+new Date().toLocaleDateString('de-AT')+' '+new Date().toLocaleTimeString('de-AT')+'</p></body></html>'; var printWindow=window.open('','','width=800,height=600'); printWindow.document.write(html); printWindow.document.close(); setTimeout(function(){ printWindow.print(); },250); }
config=configData;
initTables();
recalc();
renderHistory();
document.getElementById('printBtn').addEventListener('click',printHistory);
</script></body></html>
